services:

  # ── バックエンド（FastAPI）──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: dev
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv # コンテナ内の.venvをマウントで上書きされないよう保護
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: doc-drill
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: ap-northeast-1
      TEST_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/doc_drill_test
      # ローカルでは false。AWS デプロイ時は true に変更して KB_ID / DATA_SOURCE_ID も設定する。
      BEDROCK_KB_ENABLED: "false"
      BEDROCK_KB_ID: ${BEDROCK_KB_ID:-}
      BEDROCK_KB_DATA_SOURCE_ID: ${BEDROCK_KB_DATA_SOURCE_ID:-}
      # ローカル開発用 Bedrock 認証情報。AWS デプロイ時は IAM タスクロールで解決されるため不要。
      BEDROCK_AWS_ACCESS_KEY_ID: ${BEDROCK_AWS_ACCESS_KEY_ID:-}
      BEDROCK_AWS_SECRET_ACCESS_KEY: ${BEDROCK_AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # ── フロントエンド（Next.js）────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules # node_modulesをマウントで上書きされないよう保護
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      HOSTNAME: "0.0.0.0"
    depends_on:
      - backend

  # ── DB（PostgreSQL 16 / Aurora互換）────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── オブジェクトストレージ（MinIO / S3互換）────────────────────────────
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO初期化（バケット作成）─────────────────────────────────────────
  # 起動後に一度だけ実行されてexitする
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb local/doc-drill --ignore-existing;
        exit 0;
      "

volumes:
  db_data:
  minio_data:
  backend_venv:
  frontend_node_modules:
